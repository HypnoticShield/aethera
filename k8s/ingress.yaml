apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aethera-ingress
spec:
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3000
      - path: /api/content
        pathType: Prefix
        backend:
          service:
            name: content-service
            port:
              number: 3001
      - path: /api/subscription
        pathType: Prefix
        backend:
          service:
            name: subscription-service
            port:
              number: 3002
      - path: /api/streaming
        pathType: Prefix
        backend:
          service:
            name: streaming-service
            port:
              number: 3003
      - path: /api/recommendation
        pathType: Prefix
        backend:
          service:
            name: recommendation-service
            port:
              number: 3004
